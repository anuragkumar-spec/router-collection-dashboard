name: Refresh Dashboard Data

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8:00 AM IST, every day
  workflow_dispatch:         # also allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit data.json back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch data from Metabase
        env:
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
        run: python refresh_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: auto-refresh dashboard data $(date -u +'%Y-%m-%d')"
          git push
